version: '3'

#dotenv: ['.env'] breaks docker run

includes:
  smoke: ./scripts/smoke.yml
  call: ./scripts/call.yml

vars:
  COMPOSE: docker compose -f docker-compose.yml --env-file .env-docker

tasks:
  # ── infrastructure ───────────────────────────────────────────────────────────

  up:
    desc: Start Postgres and Redis
    cmds:
      - '{{.COMPOSE}} up --build -d postgres redis server'

  up-clean:
    desc: Start everything with a full no-cache rebuild
    cmds:
      - '{{.COMPOSE}} build --no-cache server'
      - '{{.COMPOSE}} up -d postgres redis server'

  down:
    desc: Stop and remove containers
    cmds:
      - '{{.COMPOSE}} down'

  down:volumes:
    desc: Stop containers and wipe volumes (destroys DB data)
    cmds:
      - '{{.COMPOSE}} down -v'

  restart:
    desc: restart docker containers
    cmds:
      - task: down:volumes
      - task: up

  logs:
    desc: Tail logs for all containers
    cmds:
      - '{{.COMPOSE}} logs -f'

  ps:
    desc: Show running containers
    cmds:
      - '{{.COMPOSE}} ps'

  # ── server ───────────────────────────────────────────────────────────────────

  run:
    desc: Run the MCP server (reads .env automatically)
    deps: [up]
    cmds:
      - go run ./cmd/server

  build:
    desc: Build the server binary to ./bin/server
    cmds:
      - mkdir -p bin
      - go build -o bin/server ./cmd/server

  # ── dev utilities ────────────────────────────────────────────────────────────

  tidy:
    desc: go mod tidy
    cmds:
      - go mod tidy

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  # ── database ─────────────────────────────────────────────────────────────────

  psql:
    desc: Open a psql shell using DATABASE_URL from .env
    cmds:
      - psql $DATABASE_URL

  migrate:up:
    desc: Run goose migrations up
    cmds:
      - goose -dir migrations postgres "$DATABASE_URL" up

  migrate:down:
    desc: Roll back the last goose migration
    cmds:
      - goose -dir migrations postgres "$DATABASE_URL" down

  migrate:status:
    desc: Show goose migration status
    cmds:
      - goose -dir migrations postgres "$DATABASE_URL" status

  # ── redis ────────────────────────────────────────────────────────────────────

  redis-cli:
    desc: Open a redis-cli shell using REDIS_URL from .env
    cmds:
      - redis-cli -u $REDIS_URL

  oc:
     desc: Export .env and launch opencode
     cmds:
        - export $(grep -v '^#' .env | grep -v '^$' | sed 's/#.*//' | xargs) && opencode