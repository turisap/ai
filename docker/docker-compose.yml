services:
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

  redis:
    image: redis:7-alpine
    hostname: redis
    ports:
      - "6379:6379"

  server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_URL: "${REDIS_URL}"
      MCP_API_KEY: "${MCP_API_KEY}"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
